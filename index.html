<html>
<head>

<!-- Makes the page responsive on mobile devices -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Page title shown in browser tab -->
<title>To Do List</title>
<style>

/* Styling for the whole page */
body {
margin: 0;
font-family: Arial, sans-serif;

/* Center the box horizontally and vertically */
 height: 100vh;
 background:linear-gradient(135deg,#4f46e5,#7c3aed,#ec4899);
 background-size: cover;
 animation:gradientMove 10s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
/* Main container */
.box {
 width: 600px;
 background:rgba(255,255,255,0.12);
 backdrop-filter:blur(15px);
 border:1px solid rgba(255,255,255,0.2);
 border-radius:25px;
 padding:30px;
 box-shadow:0 10px 40px rgba(0,0,0,0.25);
}
/* Input textbox styling */
 input {
 width: 65%;
 padding: 8px;
 border-radius: 12px;
 }
/* Input focus */
 input:focus {
 outline: 2px solid blue;
 }

/* button styling */
 button{
 background-color: #6a0dad; 
 color: white;
 border: none;
 padding: 12px 24px;
 border-radius: 8px;
 cursor: pointer;
 font-size: 16px;
 font-weight: 500;
 transition: 0.3s ease;
}
/* pseudo classes /*
button:hover{
background-color: #7b1fa2;
}
button:active{
background-color: #4b0082;
transform: scale(0.97);
 }

/* Table Styling */
table{
width:100%;
margin-top:15px;
border-collapse:collapse;
overflow:hidden;
border-radius:12px;
box-shadow:0 6px 18px rgba(79,70,229,0.25);
background:white;
}

/* Table Header */
th{
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
padding:14px;
text-align:center;
font-size:16px;
letter-spacing:0.5px;
}

/* Table Cells */
td{
padding:12px;
text-align:center;
border-bottom:1px solid #e5e7eb;
transition:0.3s;
}

/* Hover Effect */
tr:hover{
background:#f3f4ff;
}

/* Alternate Rows */
tr:nth-child(even){
background:#faf5ff;
}

/* Completed Task */
.done{
 text-decoration:line-through;
 color:#16a34a;
 font-weight:600;
 position:relative;
}

/* Completed Task Icon */
.done::before{
 content:"✔ ";
 lor:#22c55e;
 font-weight:bold;
}
 </style>
 </head>
 <body>

 <!-- Main To-Do container -->
 <div class="box">

 <h1>To Do List</h1>
 <input type="text" id="task" placeholder="Enter task">
 <button id="add">Add</button>

 <!-- Task table -->
 <table>
 <thead>
 <tr>
 <th>Task</th>
 <th>Status</th>
 <th>Action</th>
 </tr>
 </thead>

 <!-- New tasks will be added here -->
 <tbody id="tableBody"></tbody>
 </table>
 </div>
 <script>

 // DOM MODEL
  let task = document.getElementById("task");

 // Get the table body element
  let tableBody = document.getElementById("tableBody");

  // eventlistener
  document.getElementById("add").addEventListener("click", function () {
  if (task.value.trim() === "") {
  return;
  }

  // Create a new table row
  let row = `
  <tr>
  <td>${task.value}</td>
  <td>
  <button onclick="toggleStatus(this)">
  Pending
  </button>
  </td>

  <!-- Delete button column -->
  <td>
  <button onclick="deleteTask(this)">
  Delete
  </button>
  </td>
  </tr>
  `;
  // To Add row in table
  tableBody.innerHTML += row;
  // Saves data in local storage
  save();
  task.value = "";
  });

  // Function to mark task status
  function toggleStatus(btn) {

  // Get first cell (task name)
  let taskCell =
  btn.parentElement.parentElement.children[0];

  // Toggles completed class
  taskCell.classList.toggle("done");
  if (taskCell.classList.contains("done")) {

  // Updates the button
  btn.innerText = "Completed";
  }
  else {
  btn.innerText = "Pending";
  }

  // Saves the updates
  save();
  }

  // Function to delete task
  function deleteTask(btn) {

  // Remove entire row
  btn.parentElement.parentElement.remove();

  // Save updated table
  save();
  }
  function save() { 

  // Stores table content in local storage
  localStorage.tasks = tableBody.innerHTML;
  }

  // Load saved tasks when page opens
  tableBody.innerHTML = localStorage.tasks || "";
  </script>
  </body>
  </html>
