<!DOCTYPE html>
<html lang="en">

<head>

<!-- Sets character encoding -->
<meta charset="UTF-8">


<!-- Makes website responsive on mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Browser tab title -->
<title>To do List</title>


<style>

/* ==========================
   BASIC PAGE SETTINGS
========================== */

*{

    /* Remove default spacing */
    margin:0;

    padding:0;


    /* Include padding and border in size */
    box-sizing:border-box;


    /* Default font */
    font-family:Arial,sans-serif;

}



/* ==========================
   BODY BACKGROUND
========================== */

body{


    /* Full screen height */
    min-height:100vh;


    /* Center container */
    display:flex;

    justify-content:center;

    align-items:center;


    /* Space around container */
    padding:20px;



    /* Blue purple gradient */
    background:
    linear-gradient(
        135deg,
        #1e1b4b,
        #6d28d9,
        #2563eb
    );



    /* Smooth gradient animation */
    background-size:300% 300%;


    animation:bgAnimation 10s infinite;

}





/* Background movement */

@keyframes bgAnimation{


0%{

background-position:0% 50%;

}


50%{

background-position:100% 50%;

}


100%{

background-position:0% 50%;

}


}






/* ==========================
   MAIN TODO BOX
========================== */


.container{


    /* Box width */
    width:650px;


    /* Responsive width */
    max-width:100%;



    /* Glass effect */
    background:
    rgba(255,255,255,0.15);



    backdrop-filter:blur(15px);



    /* Space inside */
    padding:30px;



    /* Rounded corners */
    border-radius:25px;



    /* Shadow */
    box-shadow:
    0 20px 40px rgba(0,0,0,0.35);


}







/* Heading */

h1{


    text-align:center;


    color:white;


    margin-bottom:25px;

}





/* ==========================
   INPUT AREA
========================== */


.input-area{


    /* Put input and button in row */
    display:flex;


    gap:10px;


}




/* Input box */


input{


    /* Takes remaining space */
    flex:1;



    padding:13px;


    border:none;


    outline:none;


    border-radius:12px;


    font-size:16px;

}




/* When input clicked */

input:focus{


    box-shadow:

    0 0 15px #c084fc;


}







/* ==========================
   BUTTON STYLE
========================== */


button{


    padding:12px 18px;


    border:none;


    border-radius:12px;


    cursor:pointer;


    color:white;


    font-weight:bold;



    /* Purple gradient */

    background:

    linear-gradient(
    135deg,
    #7c3aed,
    #2563eb
    );



    transition:.3s;


}






/* Mouse hover */

button:hover{


    transform:translateY(-3px);


    box-shadow:
    0 5px 15px rgba(0,0,0,.3);


}





/* Button click */

button:active{


    transform:scale(.95);


}







/* ==========================
   TABLE DESIGN
========================== */


table{


    width:100%;


    margin-top:25px;


    border-collapse:separate;


    border-spacing:0;


    overflow:hidden;


    border-radius:15px;


    background:white;



    box-shadow:
    0 10px 25px rgba(0,0,0,.3);


}







/* Table heading */

th{


    padding:15px;


    color:white;



    background:

    linear-gradient(
    135deg,
    #2563eb,
    #9333ea
    );

}



 /* Table data */


td{


    padding:12px;


    text-align:center;


    border-bottom:1px solid #ddd;


    color:#333;


}






/* Row hover effect */

tr:hover td{


    background:#ede9fe;


}






/* Alternate row color */

tr:nth-child(even) td{


    background:#faf5ff;


}







/* ==========================
   COMPLETED TASK
========================== */


.done{


    /* Strike completed task */

    text-decoration:line-through;



    color:#16a34a;



    font-weight:bold;


}




/* Add tick before completed */

.done::before{


    content:"✔ ";


    color:#22c55e;


}






/* Delete button */

.delete{


    background:#ef4444;


}



/* Delete hover */

.delete:hover{


    background:#dc2626;


}






/* Small buttons */

.small-btn{


    padding:8px 12px;


    font-size:13px;


}






/* ==========================
   MOBILE RESPONSIVE
========================== */


@media(max-width:600px){


    /* Stack input and button */

    .input-area{


        flex-direction:column;


    }



    button{


        width:100%;


    }



    th,td{


        font-size:13px;


        padding:9px;


    }



    .container{


        padding:20px;


    }


}



</style>


</head>






<body>




<!-- Main Todo Container -->

<div class="container">



<!-- Page title -->

<h1> Todo List </h1>






<!-- Input and Add button -->

<div class="input-area">


<!-- User enters task here -->

<input
type="text"
id="taskInput"
placeholder="Enter task">



<!-- Add task button -->

<button id="addBtn">

Add Task

</button>


</div>








<!-- Task table -->


<table>


<thead>


<tr>


<!-- Table headings -->

<th>Task</th>


<th>Status</th>


<th>Action</th>


</tr>


</thead>





<!-- JavaScript adds tasks here -->

<tbody id="taskList">


</tbody>




</table>





</div>








<script>


// ==========================
// GET HTML ELEMENTS
// ==========================


// Input box

const input =
document.getElementById("taskInput");


// Add button

const addBtn =
document.getElementById("addBtn");


// Table body

const list =
document.getElementById("taskList");





// ==========================
// LOAD SAVED TASKS
// ==========================


list.innerHTML =

localStorage.getItem("tasks") || "";








// ==========================
// ADD BUTTON EVENT
// ==========================


addBtn.addEventListener(
"click",
addTask
);





// Press Enter to add task

input.addEventListener(
"keypress",
function(e){


if(e.key==="Enter"){


addTask();


}


});







// ==========================
// ADD TASK FUNCTION
// ==========================


function addTask(){



// Get input value

let text =
input.value.trim();





// Empty check

if(text===""){


alert("Enter a task");


return;


}







// Create table row


let row =
document.createElement("tr");






// Add row content


row.innerHTML = `


<td>${text}</td>


<td>

<button 
class="small-btn"
onclick="completeTask(this)">

Pending

</button>

</td>


<td>

<button
class="small-btn delete"
onclick="deleteTask(this)">

Delete

</button>


</td>


`;






// Add row to table

list.appendChild(row);






// Save data

save();




// Clear input

input.value="";



}








// ==========================
// COMPLETE TASK
// ==========================


function completeTask(btn){



// Find task cell

let task =

btn.parentElement
.parentElement
.children[0];






// Add/remove done class

task.classList.toggle("done");






// Change button text

if(task.classList.contains("done")){


btn.innerHTML="Completed";


}

else{


btn.innerHTML="Pending";


}






// Save update

save();


}








// ==========================
// DELETE TASK
// ==========================


function deleteTask(btn){



// Remove complete row

btn.parentElement
.parentElement
.remove();




// Save changes

save();


}








// ==========================
// LOCAL STORAGE SAVE
// ==========================


function save(){



localStorage.setItem(

"tasks",

list.innerHTML

);


}



</script>




</body>

</html>
